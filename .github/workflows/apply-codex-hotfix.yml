name: Apply Codex Hotfix

on:
  push:
    paths:
      - .codex-hotfix-trigger
      - .github/workflows/apply-codex-hotfix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch homepage and hub styles
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace('''    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
    }
    .nav a {
      color: #dce6f2;
      font-size: 14px;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: var(--radius);
    }''', '''    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }
    .nav a {
      color: #dce6f2;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 7px;
      border-radius: var(--radius);
      white-space: nowrap;
    }''')
          text = text.replace('    .nav-menu-extra { display: none; }', '    .nav-menu-extra { display: inline-flex; }')
          text = text.replace('<a class="nav-menu-extra" href="#top">Home</a>', '<a class="nav-menu-extra nav-home-link" href="#top">Home</a>')
          text = text.replace('<a href="#projects">Projects</a>', '<a href="#projects">Work</a>')
          text = text.replace('<a class="nav-menu-extra" href="#innovation-hub-preview">Hub preview</a>', '<a class="nav-menu-extra" href="#innovation-hub-preview">Hub</a>')
          if '<a class="nav-menu-extra" href="#why-jp">Why JP</a>' not in text:
              text = text.replace('<a href="#projects">Work</a>\n        <a href="#industries">Industries</a>', '<a href="#projects">Work</a>\n        <a class="nav-menu-extra" href="#why-jp">Why JP</a>\n        <a href="#industries">Industries</a>')
          text = text.replace('assets/case-study-linkage-assembly.png', 'assets/case-study-linkage-assembly.webp')
          text = text.replace('<span>Automotive</span><span>Motorsport</span><span>Manufacturing</span><span>Robotics & Automation</span><span>Industrial Equipment</span><span>Consumer Products</span><span>Start-ups & Inventors</span>', '<span>Automotive</span><span>Motorsport</span><span>Manufacturing</span><span>Robotics & Automation</span><span>Industrial Equipment</span><span>Consumer Products</span><span>Start-ups & Inventors</span><span>Medical & Lab Equipment</span>')
          index.write_text(text, encoding='utf-8')

          styles = Path('hub-portal/styles.css')
          css = styles.read_text(encoding='utf-8')
          if '.confirm-dialog { z-index: 990; }' not in css:
              marker = '.reputation-status-dialog { z-index: 980; }'
              block = '''\n.confirm-dialog { z-index: 990; }
.confirm-card {
  max-width: 440px;
  border-color: rgba(47, 141, 255, .34);
  box-shadow: 0 28px 90px rgba(0,0,0,.55), 0 0 34px rgba(47,141,255,.12);
}
.confirm-card h2 { margin-bottom: 8px; }
.confirm-actions {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-top: 18px;
}
.confirm-actions .danger-action {
  border-color: rgba(255, 99, 99, .5);
  background: linear-gradient(135deg, #8a1f1f, #e34b4b);
}
'''
              css = css.replace(marker, marker + block)
              styles.write_text(css, encoding='utf-8')
          PY
      - name: Commit hotfix
        run: |
          git config user.name "JP Innovation Codex"
          git config user.email "actions@github.com"
          git add index.html hub-portal/styles.css
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Apply homepage and hub style hotfix"
            git push
          fi
