name: Codex Dashboard Clean 3Way Runner

on:
  push:
    paths:
      - .codex-trigger-dashboard-clean-runner3-20260717

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract and apply dashboard patch with 3-way merge
        run: |
          python3 - <<'PY'
          from pathlib import Path
          src = Path('.github/workflows/codex-dashboard-clean-20260717.yml').read_text(encoding='utf-8')
          start = "cat > /tmp/dashboard-clean.patch <<'PATCH_EOF_CODEX_20260717'"
          end = "PATCH_EOF_CODEX_20260717"
          body = src.split(start, 1)[1].split(end, 1)[0]
          lines = body.splitlines()
          if lines and not lines[0].strip():
              lines = lines[1:]
          dedented = [line[10:] if line.startswith('          ') else line for line in lines]
          Path('/tmp/dashboard-clean.patch').write_text('\n'.join(dedented) + '\n', encoding='utf-8')
          PY
          git apply --3way /tmp/dashboard-clean.patch
      - name: Commit dashboard clean update
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add hub-portal/app.js hub-portal/index.html hub-portal/styles.css
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Simplify Hub dashboard layout"
            git push
          fi
