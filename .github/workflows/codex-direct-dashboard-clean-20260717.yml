name: Codex Direct Dashboard Clean Deploy

on:
  push:
    paths:
      - .codex-trigger-direct-dashboard-clean-20260717

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply direct dashboard update
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import base64

          def dec(s):
              return base64.b64decode(s).decode('utf-8')

          def replace_between(src, start, end, repl):
              a = src.index(start)
              b = src.index(end, a)
              return src[:a] + repl + src[b:]

          app_path = Path('hub-portal/app.js')
          text = app_path.read_text(encoding='utf-8')
          text = replace_between(text, 'function prepareCompactSections(view) {', 'function renderClientDashboard(user) {', dec(""""""))
          text = replace_between(text, 'function renderDashboard(user) {', 'function metric(label, value) {', dec(""""""))
          text = replace_between(text, 'function dashboardSummaryItems(', 'function recentDashboardReplies(', dec(""""""))
          app_path.write_text(text, encoding='utf-8')

          index_path = Path('hub-portal/index.html')
          index = index_path.read_text(encoding='utf-8')
          index = index.replace('styles.css?v=admin-badge-nav-20260715', 'styles.css?v=dashboard-clean-20260717')
          index = index.replace('app.js?v=hub-profile-fallback-20260717', 'app.js?v=dashboard-clean-20260717')
          old_bell = '<button id="topNotificationBell" class="notification-bell jp-notification-button" type="button" aria-label="Open JP notifications" aria-controls="notificationPopover" aria-expanded="false">\n                <img class="jp-notification-symbol" src="../assets/jp-app-icon.svg" alt="" aria-hidden="true">'
          new_bell = '<button id="topNotificationBell" class="notification-bell" type="button" aria-label="Open notifications" aria-controls="notificationPopover" aria-expanded="false">\n                <svg viewBox="0 0 24 24" aria-hidden="true">\n                  <path d="M18 9a6 6 0 0 0-12 0c0 7-3 7-3 7h18s-3 0-3-7"/>\n                  <path d="M10 20a2 2 0 0 0 4 0"/>\n                </svg>'
          index = index.replace(old_bell, new_bell)
          index_path.write_text(index, encoding='utf-8')
          PY
      - name: Commit direct dashboard update
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add hub-portal/app.js hub-portal/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Simplify Hub dashboard properly"
            git push
          fi
