name: Codex Hub Loop Fix

on:
  push:
    paths:
      - .codex-hub-loop-trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Hub login loop
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('hub-portal/app.js')
          text = app.read_text(encoding='utf-8')
          old = "  try {\n    await syncSecureSession();\n    await loadSecureUserData();\n    startPresenceHeartbeat();\n  } catch (error) {\n    state.sessionEmail = \"\";\n    saveState();\n    console.error(\"Secure session could not be loaded.\", error);\n  }\n"
          new = "  try {\n    await syncSecureSession();\n  } catch (error) {\n    state.sessionEmail = \"\";\n    saveState();\n    console.error(\"Secure session could not be loaded.\", error);\n  }\n  if (currentUser()) {\n    try {\n      await loadSecureUserData();\n    } catch (error) {\n      console.warn(\"Hub data could not be fully loaded. Keeping the signed-in session active.\", error);\n    }\n    startPresenceHeartbeat();\n  }\n"
          if old in text:
              text = text.replace(old, new)
          app.write_text(text, encoding='utf-8')

          portal_index = Path('hub-portal/index.html')
          text = portal_index.read_text(encoding='utf-8')
          text = text.replace('app.js?v=hub-session-fix-20260717', 'app.js?v=hub-loop-fix-20260717')
          portal_index.write_text(text, encoding='utf-8')

          hub_app = Path('hub/app.js')
          text = hub_app.read_text(encoding='utf-8')
          text = text.replace('hub-session-fix-20260717', 'hub-loop-fix-20260717')
          hub_app.write_text(text, encoding='utf-8')

          hub_index = Path('hub/index.html')
          text = hub_index.read_text(encoding='utf-8')
          text = text.replace('app.js?v=hub-session-fix-20260717', 'app.js?v=hub-loop-fix-20260717')
          hub_index.write_text(text, encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "JP Innovation Codex"
          git config user.email "actions@github.com"
          git add hub-portal/app.js hub-portal/index.html hub/app.js hub/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Stop Hub login redirect loop"
            git push
          fi
