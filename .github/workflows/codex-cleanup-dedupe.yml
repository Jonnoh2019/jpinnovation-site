name: Codex Cleanup Dedupe

on:
  push:
    paths:
      - .codex-dedupe-trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  dedupe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove duplicate homepage entries
        run: |
          python - <<'PY'
          from pathlib import Path
          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          duplicate = '<span>Medical & Lab Equipment</span><span>Medical & Lab Equipment</span>'
          text = text.replace(duplicate, '<span>Medical & Lab Equipment</span>')
          index.write_text(text, encoding='utf-8')
          PY
      - name: Commit cleanup
        run: |
          git config user.name "JP Innovation Codex"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Remove duplicate homepage industry"
            git push
          fi
