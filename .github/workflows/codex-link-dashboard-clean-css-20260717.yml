name: Codex Link Dashboard Clean CSS

on:
  push:
    paths:
      - .codex-trigger-link-dashboard-clean-css-20260717

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Link dashboard clean stylesheet
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('hub-portal/index.html')
          text = p.read_text(encoding='utf-8')
          clean = '    <link rel="stylesheet" href="dashboard-clean.css?v=dashboard-clean-20260717">'
          if clean not in text:
              text = text.replace('    <link rel="stylesheet" href="styles.css?v=admin-badge-nav-20260715">', '    <link rel="stylesheet" href="styles.css?v=admin-badge-nav-20260715">\n' + clean)
          p.write_text(text, encoding='utf-8')
          PY
      - name: Commit dashboard stylesheet link
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          git add hub-portal/index.html
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Link clean Hub dashboard stylesheet"
            git push
          fi
