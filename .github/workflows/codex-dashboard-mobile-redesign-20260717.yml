name: Codex mobile dashboard redesign patch

on:
  push:
    paths:
      - '.github/workflows/codex-dashboard-mobile-redesign-20260717.yml'
      - '.codex-render-dashboard-mobile-20260717.b64'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace dashboard renderer and bump cache
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64

          app_path = Path('hub-portal/app.js')
          index_path = Path('hub-portal/index.html')
          payload_path = Path('.codex-render-dashboard-mobile-20260717.b64')

          app = app_path.read_text(encoding='utf-8')
          new_fn = base64.b64decode(payload_path.read_text(encoding='utf-8').strip()).decode('utf-8')

          start = app.index('function renderDashboard(user) {')
          end = app.index('\nfunction metric(', start)
          app = app[:start] + new_fn + app[end:]
          app_path.write_text(app, encoding='utf-8')

          html = index_path.read_text(encoding='utf-8')
          html = html.replace('app.js?v=dashboard-clean-20260717', 'app.js?v=dashboard-mobile-redesign-20260717')
          html = html.replace('dashboard-clean.css?v=dashboard-mobile-compact-20260717', 'dashboard-clean.css?v=dashboard-mobile-redesign-20260717')
          index_path.write_text(html, encoding='utf-8')
          PY
      - name: Commit patch
        run: |
          git config user.name "codex-app[bot]"
          git config user.email "codex-app[bot]@users.noreply.github.com"
          git add hub-portal/app.js hub-portal/index.html
          git diff --cached --quiet && echo "No changes to commit" || git commit -m "Redesign mobile Hub dashboard"
          git push
